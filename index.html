<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Monaco GP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#FFEC00" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      @media (pointer: coarse) {
        .desktop-only { display: none !important; }
      }
      .leaderboard-list::-webkit-scrollbar { width: 6px; }
      .leaderboard-list::-webkit-scrollbar-track { background: transparent; }
      .leaderboard-list::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.18);
        border-radius: 3px;
      }
      .leaderboard-list::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.32);
      }
      @keyframes mgpPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.4); opacity: 0.7; }
      }
      @keyframes mgpToastIn {
        0%   { opacity: 0; transform: translate(-50%, -8px) scale(0.96); }
        100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      }
      @keyframes mgpToastLifecycle {
        0%   { opacity: 0; transform: translate(-50%, -8px) scale(0.96); }
        8%   { opacity: 1; transform: translate(-50%, 0) scale(1); }
        80%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
        100% { opacity: 0; transform: translate(-50%, 0) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script async src="https://vibej.am/2026/widget.js"></script>
  </body>
</html>
